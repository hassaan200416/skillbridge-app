name: skillbridge
description: "SkillBridge — local services marketplace built with Flutter, Supabase, and Gemini AI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

# ==============================================================================
# Dependencies
# ==============================================================================

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------------------------------------------------------
  # Backend — Supabase (auth, database, storage, realtime)
  # ----------------------------------------------------------------------------
  supabase_flutter: ^2.8.4

  # ----------------------------------------------------------------------------
  # State management — Riverpod
  # ----------------------------------------------------------------------------
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1 # @riverpod code-gen annotations

  # ----------------------------------------------------------------------------
  # Navigation — GoRouter
  # ----------------------------------------------------------------------------
  go_router: ^14.6.2

  # ----------------------------------------------------------------------------
  # Configuration — environment variables
  # ----------------------------------------------------------------------------
  flutter_dotenv: ^5.2.1

  # ----------------------------------------------------------------------------
  # Media — image picking, caching, cropping
  # ----------------------------------------------------------------------------
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # ----------------------------------------------------------------------------
  # UI components
  # ----------------------------------------------------------------------------
  google_fonts: ^8.0.2 # Poppins / Inter for auth & marketing UI
  flutter_rating_bar: ^4.0.1 # interactive star-rating widget
  shimmer: ^3.0.0 # loading skeleton shimmer effect
  table_calendar: ^3.1.2 # provider calendar screen
  fl_chart: ^0.69.0 # analytics bar / line charts

  # ----------------------------------------------------------------------------
  # Internationalisation & formatting
  # ----------------------------------------------------------------------------
  intl: ^0.19.0 # DateFormat, NumberFormat
  timeago: ^3.7.0 # "2 hours ago" relative timestamps

  # ----------------------------------------------------------------------------
  # Utilities
  # ----------------------------------------------------------------------------
  http: ^1.2.2 # Groq OpenAI-compatible chat (SkillBot)
  uuid: ^4.5.1 # generate UUIDs client-side
  connectivity_plus: ^6.1.1 # detect network connectivity changes
  path_provider: ^2.1.5 # file-system paths for cache / downloads
  share_plus: ^10.1.2 # native share sheet
  url_launcher: ^6.3.1 # open URLs, phone, email links

  # ----------------------------------------------------------------------------
  # Icons (bundled with Flutter)
  # ----------------------------------------------------------------------------
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2

# ==============================================================================
# Dev dependencies
# ==============================================================================

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Riverpod code generation
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13

  # Linting
  flutter_lints: ^5.0.0

# ==============================================================================
# Flutter configuration
# ==============================================================================

flutter:
  uses-material-design: true

  # Assets — env files for flutter_dotenv (see main.dart: web uses app.env).
  assets:
    - assets/app.env
    - assets/images/
    - assets/icons/

  # Fonts — add entries here once a custom typeface is added to assets/fonts/.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
